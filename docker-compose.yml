version: '3.9'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: foodwaste_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: foodwaste
      POSTGRES_PASSWORD: foodwaste_secret
      POSTGRES_DB: foodwaste_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U foodwaste -d foodwaste_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
